version: "3.8"

services:
  frontend:
    image: 527055790396.dkr.ecr.ap-southeast-1.amazonaws.com/frontend-app:latest
    container_name: frontend-app
    ports:
      - "80:3000"
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
